name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      PLUGIN_ID: any-ai-cli
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Stage plugin bundle
        run: |
          set -e
          STAGE_DIR="dist/${PLUGIN_ID}"
          mkdir -p "${STAGE_DIR}"
          # Files required at runtime by the plugin (see README "Install in a Vault").
          # node-pty is a native module: ship package.json + package-lock.json so
          # the user installs it for their own platform via `npm install --omit=dev`.
          for f in manifest.json main.js styles.css versions.json pty-proxy.js pty-bridge.py package.json package-lock.json; do
            if [ ! -f "$f" ]; then
              echo "Missing required plugin file: $f"
              exit 1
            fi
            cp "$f" "${STAGE_DIR}/"
          done

      - name: Create plugin zip
        run: |
          set -e
          cd dist
          zip -r "../${PLUGIN_ID}-${GITHUB_REF_NAME}.zip" "${PLUGIN_ID}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          # Per Obsidian release guide, releases are created as drafts so the
          # author can review release notes before publishing.
          draft: true
          body: |
            ## Install

            1. Download `${{ env.PLUGIN_ID }}-${{ github.ref_name }}.zip` below.
            2. Unzip it inside your vault's plugin folder so the resulting path is `/PATH/TO/VAULT/.obsidian/plugins/${{ env.PLUGIN_ID }}/`.
            3. Enable the plugin in Obsidian → Settings → Community plugins.

            No commands required. The plugin uses an embedded Python PTY bridge fallback so it works out of the box on macOS / Linux, and falls back to direct pipe mode on Windows.

            ### Optional — native PTY backend

            For best terminal fidelity (full-screen TUI rendering, resize), install the native `node-pty` module after unzipping:

            ```bash
            cd "/PATH/TO/VAULT/.obsidian/plugins/${{ env.PLUGIN_ID }}"
            npm install --omit=dev
            ```

            Then reload the plugin.

            ### Files required at runtime

            Unlike a typical single-bundle Obsidian plugin, this plugin spawns a child process that needs auxiliary files alongside `main.js`. **All of the files listed below must end up in the plugin folder** for the panel to work — that is why the recommended install path is the bundled zip rather than the three standalone files at the bottom of the release.

            - `manifest.json` — Obsidian plugin metadata (id, version, minAppVersion).
            - `main.js` — bundled plugin code (TS compiled by `esbuild`).
            - `styles.css` — sidebar / toolbar / dropdown styling.
            - `versions.json` — maps each plugin version to its `minAppVersion` for backwards-compatible installs.
            - `pty-proxy.js` — Node child process that runs the user's CLI inside a PTY (or one of its fallbacks).
            - `pty-bridge.py` — Python PTY fallback used on macOS/Linux when `node-pty` is not installed.
            - `package.json` and `package-lock.json` — only required if you want to opt into the native `node-pty` backend via `npm install --omit=dev`.

            Each file is also attached individually below so you can replace one without re-downloading the whole zip (useful for development / debugging).

            ### Manual install / Obsidian auto-update

            `main.js`, `manifest.json`, and `styles.css` are attached as standalone files for compatibility with Obsidian's plugin update protocol and tools like BRAT — but as noted above, **those three are not sufficient on their own**. Use the zip for first install and update; the three standalone files only cover hot-patches of the bundled code, manifest, or stylesheet.
          files: |
            ${{ env.PLUGIN_ID }}-${{ github.ref_name }}.zip
            main.js
            manifest.json
            styles.css
            versions.json
            pty-proxy.js
            pty-bridge.py
            package.json
            package-lock.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
